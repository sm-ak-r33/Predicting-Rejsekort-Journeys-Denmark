monthly:
  cmd: python pipeline/ingest_monthly.py && python pipeline/monthly_forecast.py
  deps:
    - pipeline/download-monthly.js
    - pipeline/download-mothly-script 2.js
    - pipeline/ingest_monthly.py
    - pipeline/monthly_forecast.py
  outs:
    - results/monthly/raw/rejsekort_monthly_chart_export.xlsx:
        persist: true
    - results/monthly/raw/rejsekort_monthly_export_extension_data.xlsx:
        persist: true
    - results/monthly/monthly_cleaned.csv
    - results/monthly/monthly_forecast.csv
    - results/monthly/monthly_model_metrics.csv
    - results/monthly/monthly_trends.png
