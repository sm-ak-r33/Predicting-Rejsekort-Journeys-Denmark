stages:
  ingest:
    cmd: node pipeline/download-daily.js && python pipeline/prepare_daily_ingest.py
    deps:
      - pipeline/download-daily.js
      - pipeline/prepare_daily_ingest.py
    outs:
      - Data(update).xlsx
      - pipeline/rejsekort_latest_year_daily_export.xlsx

  preprocess:
    cmd: python pipeline/preprocessing.py
    deps:
      - Data(update).xlsx
      - pipeline/preprocessing.py
    outs:
      - results/daily/data_cleaned.csv

  selected_arima:
    cmd: python pipeline/selected_arima.py
    deps:
      - results/daily/data_cleaned.csv
      - pipeline/selected_arima.py
      - pipeline/forecast_utils.py
    outs:
      - results/daily/sarima_metrics.csv
      - results/daily/sarima_forecast.csv

  autoarima:
    cmd: python pipeline/autoarima.py
    deps:
      - results/daily/data_cleaned.csv
      - pipeline/autoarima.py
      - pipeline/forecast_utils.py
    outs:
      - results/daily/autoarima_metrics.csv
      - results/daily/autoarima_forecast.csv

  prophet:
    cmd: python pipeline/prophet_model.py
    deps:
      - results/daily/data_cleaned.csv
      - pipeline/prophet_model.py
    outs:
      - results/daily/prophet_metrics.csv
      - results/daily/prophet_forecast.csv

  bilstm:
    cmd: python pipeline/BiLSTM.py
    deps:
      - results/daily/data_cleaned.csv
      - pipeline/BiLSTM.py
    outs:
      - results/daily/bilstm_metrics.csv
      - results/daily/bilstm_forecast.csv
      - results/daily/bilstm_validation.png

  daily_forecast:
    cmd: python pipeline/daily_forecast.py
    deps:
      - results/daily/data_cleaned.csv
      - results/daily/sarima_metrics.csv
      - results/daily/sarima_forecast.csv
      - results/daily/autoarima_metrics.csv
      - results/daily/autoarima_forecast.csv
      - results/daily/prophet_metrics.csv
      - results/daily/prophet_forecast.csv
      - results/daily/bilstm_metrics.csv
      - results/daily/bilstm_forecast.csv
      - pipeline/daily_forecast.py
      - pipeline/forecast_utils.py
    outs:
      - results/daily/daily_forecast.csv
      - results/daily/daily_model_metrics.csv
      - results/daily/daily_trends.png

  monthly:
    cmd: python pipeline/ingest_monthly.py && python pipeline/monthly_forecast.py
    deps:
      - pipeline/download-monthly.js
      - pipeline/download-mothly-script 2.js
      - pipeline/ingest_monthly.py
      - pipeline/monthly_forecast.py
    outs:
      - results/monthly/raw/rejsekort_monthly_chart_export.xlsx:
          persist: true
      - results/monthly/raw/rejsekort_monthly_export_extension_data.xlsx:
          persist: true
      - results/monthly/monthly_cleaned.csv
      - results/monthly/monthly_forecast.csv
      - results/monthly/monthly_model_metrics.csv
      - results/monthly/monthly_trends.png
