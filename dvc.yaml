stages:
  ingest:
    cmd: node pipeline/download-daily.js && python pipeline/prepare_daily_ingest.py
    deps:
      - pipeline/download-daily.js
      - pipeline/prepare_daily_ingest.py
    outs:
      - Data(update).xlsx
      - pipeline/rejsekort_latest_year_daily_export.xlsx

  preprocess:
    cmd: python pipeline/preprocessing.py
    deps:
      - Data(update).xlsx
      - pipeline/preprocessing.py
    outs:
      - data_cleaned.csv

  selected_arima:
    cmd: python pipeline/selected_arima.py
    deps:
      - data_cleaned.csv
      - pipeline/selected_arima.py
    outs:
      - sarima_metrics.csv

  autoarima:
    cmd: python pipeline/autoarima.py
    deps:
      - data_cleaned.csv
      - pipeline/autoarima.py
    outs:
      - autoarima_metrics.csv

  prophet:
    cmd: python pipeline/prophet_model.py
    deps:
      - data_cleaned.csv
      - pipeline/prophet_model.py
    outs:
      - prophet_metrics.csv

  bilstm:
    cmd: python pipeline/BiLSTM.py
    deps:
      - data_cleaned.csv
      - pipeline/BiLSTM.py
    outs:
      - bilstm_metrics.csv
      - output.png

  monthly:
    cmd: node pipeline/download-monthly.js && node "pipeline/download-mothly-script 2.js" && python pipeline/monthly_forecast.py
    deps:
      - pipeline/download-monthly.js
      - pipeline/download-mothly-script 2.js
      - pipeline/monthly_forecast.py
    outs:
      - pipeline/rejsekort_monthly_chart_export.xlsx
      - pipeline/rejsekort_monthly_export_extension_data.xlsx:
          persist: true
      - monthly_cleaned.csv
      - monthly_forecast.csv
      - monthly_model_metrics.csv
      - monthly_trends.png
