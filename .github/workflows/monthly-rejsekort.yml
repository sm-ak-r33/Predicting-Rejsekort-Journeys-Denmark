name: Monthly Rejsekort Forecast

on:
  workflow_dispatch:

  schedule:
    - cron: "30 6 1 * *"
      timezone: "Europe/Copenhagen"

permissions:
  contents: write

concurrency:
  group: monthly-rejsekort-forecast
  cancel-in-progress: true

jobs:
  monthly:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install system display tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run monthly DVC pipeline
        run: xvfb-run -a python -m dvc repro monthly --force

      - name: Commit updated monthly outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dvc.lock
          git add docs/assets/monthly_trends.png
          git add results/monthly/.gitignore || true

          if git diff --cached --quiet; then
            echo "No monthly changes to commit."
          else
            git commit -m "update monthly Rejsekort forecast"
            git push
          fi