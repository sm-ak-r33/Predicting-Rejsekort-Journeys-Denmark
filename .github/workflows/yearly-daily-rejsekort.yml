name: Yearly Daily Rejsekort Forecast

on:
  workflow_dispatch:

  schedule:
    - cron: "0 7 2 1 *"
      timezone: "Europe/Copenhagen"

permissions:
  contents: write

concurrency:
  group: yearly-daily-rejsekort-forecast
  cancel-in-progress: true

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          

      - name: Install display tools
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Node dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run daily DVC pipeline
        run: xvfb-run -a python -m dvc repro daily_forecast --force

      - name: Commit updated daily outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dvc.lock
          git add docs/assets/daily_trends.png
          git add docs/assets/bilstm_validation.png
          git add results/daily/.gitignore || true

          if git diff --cached --quiet; then
            echo "No daily changes to commit."
          else
            git commit -m "update yearly daily Rejsekort forecast"
            git push
          fi