name: Rejsekort pipeline nightly refresh

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          npm install
          npx playwright install chromium --with-deps

      - name: Run full DVC pipeline
        run: dvc repro --force

      - name: Commit updated outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Data\(update\).xlsx data_cleaned.csv output.png monthly_cleaned.csv monthly_forecast.csv monthly_model_metrics.csv monthly_trends.png sarima_metrics.csv autoarima_metrics.csv prophet_metrics.csv bilstm_metrics.csv
          git diff --cached --quiet || git commit -m "ci: update Rejsekort forecasts [skip ci]"
          git push
