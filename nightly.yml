name: Rejsekort pipeline — nightly refresh

on:
  schedule:
    - cron: "0 4 * * *"   # 04:00 UTC every day
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Node.js (for download-daily.js + download-monthly*.js) ────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies & Playwright browsers
        working-directory: pipeline
        run: |
          npm install
          npx playwright install chromium --with-deps

      # ── 3. Python environment ─────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. Run full pipeline via DVC ─────────────────────────────────────────
      #    Stage order (dvc.yaml):
      #      ingest               → pipeline/rejsekort_latest_year_daily_export.xlsx
      #      ingest_monthly_chart → pipeline/rejsekort_monthly_chart_export.xlsx
      #      ingest_monthly_ext   → pipeline/rejsekort_monthly_export_extension_data.xlsx
      #      script1              → data_cleaned.csv
      #      script2-5            → MLflow runs + output.png
      #      monthly_forecast     → monthly_output.png + monthly_cleaned.csv
      - name: Run DVC pipeline
        run: dvc repro --force

      # ── 5. Commit updated plots back to the repo ──────────────────────────────
      - name: Commit updated forecast plots
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.png monthly_output.png monthly_cleaned.csv
          git diff --cached --quiet || git commit -m "ci: update forecast plots [skip ci]"
          git push
