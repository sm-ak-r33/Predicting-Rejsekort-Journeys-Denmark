name: rejse
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - nodejs>=18          # required for download-daily.js / download-monthly.js
  - pip:
      # Core scientific stack
      - "numpy<2.0"
      - "pandas>=1.5.3,<2.0"
      - scipy
      - scikit-learn==1.3.1
      # Excel I/O
      - openpyxl==3.1.5
      # Time-series models
      - statsmodels==0.14.4
      - "pmdarima>=2.0.4"
      - prophet==1.1.6
      - patsy==1.0.1
      - "holidays>=0.61"
      # Deep learning
      - tensorflow==2.18.0
      - keras==3.7.0
      # Plotting
      - "matplotlib>=3.9.0"
      # MLflow / tracking
      - mlflow==2.2.2
      - dagshub
      # Pipeline
      - "dvc>=3.58.0"
      # Scraping
      - playwright
      # Utilities
      - joblib==1.4.2
      - threadpoolctl==3.5.0
      - requests
